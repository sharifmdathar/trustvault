name: TrustVault CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli
      - name: Build Contracts
        run: |
          cd contracts/escrow && soroban contract build
          cd ../arbitration && soroban contract build
      - name: Run Tests
        run: |
          cd contracts/escrow && cargo test
          cd ../arbitration && cargo test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install & Build
        run: |
          cd frontend
          npm install
          npm run build
