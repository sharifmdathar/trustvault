name: TrustVault CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install Soroban CLI
        run: curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh
      - name: Build Contracts
        run: |
          cd contracts/escrow && stellar contract build
          cd ../arbitration && stellar contract build
      - name: Run Tests
        run: |
          cd contracts/escrow && cargo test
          cd ../arbitration && cargo test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install bun
        run: curl -fsSL https://bun.com/install | bash
      - name: Install & Build
        run: |
          cd frontend
          ~/.bun/bin/bun install
          ~/.bun/bin/bun run build
